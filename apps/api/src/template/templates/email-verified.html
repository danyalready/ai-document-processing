<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Email verified</title>
    </head>
    <body
        style="
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            padding: 24px;
            box-sizing: border-box;
            font-family:
                Inter,
                -apple-system,
                BlinkMacSystemFont,
                &quot;Segoe UI&quot;,
                Roboto,
                Helvetica,
                Arial,
                sans-serif;
        "
    >
        <div
            style="
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                max-width: 420px;
                width: 100%;
            "
        >
            <div
                style="
                    width: 56px;
                    height: 56px;
                    border-radius: 9999px;
                    background: #eef2ff;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    margin-bottom: 24px;
                "
            >
                <svg
                    viewBox="0 0 24 24"
                    width="24"
                    height="24"
                    fill="none"
                    stroke="#4F7CFF"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>

            <p
                style="
                    margin: 0 0 8px;
                    font-size: 22px;
                    font-weight: 600;
                    letter-spacing: -0.02em;
                    color: #111111;
                "
            >
                Email verified
            </p>

            <p
                style="
                    margin: 0 0 32px;
                    font-size: 14px;
                    line-height: 1.5;
                    color: #9ca3af;
                "
            >
                Your account is ready. You can now open the application.
            </p>

            <a
                href="{{WEB_URL}}"
                style="
                    display: inline-flex;
                    align-items: center;
                    justify-content: center;
                    height: 44px;
                    padding: 0 24px;
                    border-radius: 12px;
                    background: #4f7cff;
                    color: #ffffff;
                    text-decoration: none;
                    font-size: 14px;
                    font-weight: 500;
                    box-shadow: 0 2px 8px rgba(79, 124, 255, 0.3);
                    box-sizing: border-box;
                "
            >
                Open AiDoc
            </a>
        </div>
    </body>
</html>
