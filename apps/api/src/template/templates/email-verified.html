<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Email verified</title>
    </head>
    <body
        style="
            margin: 0;
            padding: 0;
            background: #f4f4f5;
            font-family: Arial, sans-serif;
        "
    >
        <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="background: #f4f4f5; padding: 32px 0"
        >
            <tr>
                <td align="center">
                    <table
                        role="presentation"
                        width="600"
                        cellspacing="0"
                        cellpadding="0"
                        style="
                            background: #ffffff;
                            border-radius: 8px;
                            overflow: hidden;
                        "
                    >
                        <tr>
                            <td align="center" style="padding: 48px 40px">
                                <div
                                    style="
                                        width: 56px;
                                        height: 56px;
                                        margin: 0 auto 24px;
                                        border-radius: 9999px;
                                        background: #eef2ff;
                                        display: flex;
                                        align-items: center;
                                        justify-content: center;
                                    "
                                >
                                    <svg
                                        viewBox="0 0 24 24"
                                        width="24"
                                        height="24"
                                        fill="none"
                                        stroke="#4F7CFF"
                                        stroke-width="2.5"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                    >
                                        <polyline
                                            points="20 6 9 17 4 12"
                                        ></polyline>
                                    </svg>
                                </div>

                                <h1
                                    style="
                                        margin: 0 0 12px;
                                        color: #111827;
                                        font-size: 24px;
                                        font-weight: 600;
                                    "
                                >
                                    Email verified
                                </h1>

                                <p
                                    style="
                                        margin: 0 0 16px;
                                        color: #6b7280;
                                        font-size: 16px;
                                        line-height: 1.6;
                                    "
                                >
                                    Your email address has been successfully
                                    verified.
                                </p>

                                <p
                                    style="
                                        margin: 0;
                                        color: #6b7280;
                                        font-size: 16px;
                                        line-height: 1.6;
                                    "
                                >
                                    You can now close this page and return to
                                    AiDoc to sign in and continue using your
                                    account.
                                </p>
                            </td>
                        </tr>

                        <tr>
                            <td
                                style="
                                    padding: 24px 40px;
                                    background: #f9fafb;
                                    color: #6b7280;
                                    font-size: 13px;
                                    line-height: 1.5;
                                    text-align: center;
                                "
                            >
                                <p style="margin: 0 0 8px">
                                    Need help? Contact us at
                                    <a
                                        href="mailto:support@aidoc.it.com"
                                        style="color: #2563eb"
                                    >
                                        support@aidoc.it.com
                                    </a>
                                </p>

                                <p style="margin: 0 0 8px">
                                    Website:
                                    <a
                                        href="https://aidoc.it.com"
                                        style="color: #2563eb"
                                    >
                                        https://aidoc.it.com
                                    </a>
                                </p>

                                <p style="margin: 0">
                                    © 2026 AIDoc. All rights reserved.
                                </p>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
