events {}

http {
    server {
        listen 80;

        server_name aidoc.it.com www.aidoc.it.com;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;

        server_name aidoc.it.com www.aidoc.it.com;

        ssl_certificate /etc/letsencrypt/live/aidoc.it.com/fullchain.pem;

        ssl_certificate_key /etc/letsencrypt/live/aidoc.it.com/privkey.pem;

        location / {
            proxy_pass http://web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://api:3001/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/socket.io/ {
            proxy_pass http://api:3001/socket.io/;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }

    server {
        listen 443 ssl;
        server_name minio.aidoc.it.com;

        ssl_certificate /etc/letsencrypt/live/aidoc.it.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aidoc.it.com/privkey.pem;

        location / {
            proxy_pass http://minio:9001;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
}
