events {}

http {
    server {
        listen 80;

        location / {
            proxy_pass http://web:3000;
        }

        location /api/ {
            proxy_pass http://api:3001/;
        }

        location /socket.io/ {
            proxy_pass http://api:3001/socket.io/;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;

            proxy_set_header Connection "Upgrade";
        }
    }
}