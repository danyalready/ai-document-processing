events {}

http {
    server {
        listen 80;

        server_name aidoc.it.com www.aidoc.it.com;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;

        server_name aidoc.it.com www.aidoc.it.com;

        ssl_certificate /etc/letsencrypt/live/aidoc.it.com/fullchain.pem;

        ssl_certificate_key /etc/letsencrypt/live/aidoc.it.com/privkey.pem;

        location / {
            proxy_pass http://web:3000;
        }

        location /api/ {
            proxy_pass http://api:3001/;
        }

        location /socket.io/ {
            proxy_pass http://api:3001/socket.io/;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;

            proxy_set_header Connection "Upgrade";
        }
    }
}