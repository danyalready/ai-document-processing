services:
    postgres:
        image: postgres:16
        container_name: ai-doc-postgres
        restart: unless-stopped

        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}

        expose:
            - ${POSTGRES_PORT}

        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
            interval: 10s
            timeout: 5s
            retries: 5

        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:7
        container_name: ai-doc-redis
        restart: unless-stopped

        ports:
            - "${REDIS_HOST_PORT}:${REDIS_PORT}"

        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

        expose:
            - ${REDIS_PORT}

    minio:
        image: minio/minio
        container_name: ai-doc-minio
        restart: unless-stopped

        command: server /data --console-address ":${MINIO_CONSOLE_PORT}"

        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

        expose:
            - ${MINIO_PORT}

        volumes:
            - minio_data:/data

    api:
        container_name: ai-doc-api
        restart: unless-stopped

        build:
            context: .
            dockerfile: apps/api/Dockerfile

        environment:
            PORT: ${API_PORT}

            DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}

            REDIS_HOST: redis
            REDIS_PORT: ${REDIS_PORT}

            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
            MINIO_PORT: ${MINIO_PORT}
            MINIO_ENDPOINT: ${MINIO_ENDPOINT}

            JWT_SECRET: ${JWT_SECRET}

            OPENAI_API_KEY: ${OPENAI_API_KEY}

        expose:
            - ${API_PORT}

        healthcheck:
            test:
                [
                    "CMD",
                    "node",
                    "-e",
                    "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
                ]
            interval: 30s
            timeout: 10s
            retries: 5

        depends_on:
            - postgres
            - redis

    worker:
        container_name: ai-doc-worker
        restart: unless-stopped

        build:
            context: .
            dockerfile: apps/worker/Dockerfile

        environment:
            DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}

            REDIS_HOST: redis
            REDIS_PORT: ${REDIS_PORT}

            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
            MINIO_PORT: ${MINIO_PORT}
            MINIO_ENDPOINT: ${MINIO_ENDPOINT}

            OPENAI_API_KEY: ${OPENAI_API_KEY}

        depends_on:
            - postgres
            - redis

    web:
        container_name: ai-doc-web
        restart: unless-stopped

        build:
            context: .
            dockerfile: apps/web/Dockerfile
            args:
                NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}

        environment:
            PORT: ${WEB_PORT}
            HOSTNAME: 0.0.0.0
            NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}

        expose:
            - ${WEB_PORT}

        healthcheck:
            test:
                [
                    "CMD",
                    "node",
                    "-e",
                    "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
                ]
            interval: 30s
            timeout: 5s
            retries: 3

        depends_on:
            - api

    nginx:
        image: nginx:stable-alpine
        container_name: ai-doc-nginx
        restart: unless-stopped

        ports:
            - "80:80"
            - "443:443"

        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf
            - /etc/letsencrypt:/etc/letsencrypt

        depends_on:
            api:
                condition: service_healthy

            web:
                condition: service_healthy

volumes:
    postgres_data:
    minio_data:
