services:
    postgres:
        image: postgres:16
        container_name: ai-doc-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: ai_docs
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:7
        container_name: ai-doc-redis
        restart: unless-stopped
        ports:
            - "6379:6379"

    minio:
        image: minio/minio

        container_name: ai-doc-minio

        command: server /data --console-address ":9001"

        environment:
            MINIO_ROOT_USER: minio
            MINIO_ROOT_PASSWORD: minio123

        ports:
            - "9000:9000"
            - "9001:9001"

        volumes:
            - minio_data:/data

    api:
        container_name: ai-doc-api

        build:
            context: .
            dockerfile: apps/api/Dockerfile

        ports:
            - "3001:3001"

        environment:
            PORT: 3001

            DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_docs

            REDIS_HOST: redis
            REDIS_PORT: 6379

        depends_on:
            - postgres
            - redis

    worker:
        container_name: ai-doc-worker

        build:
            context: .
            dockerfile: apps/worker/Dockerfile

        environment:
            # protocol://username:password@host:port/database
            DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_docs

            REDIS_HOST: redis
            REDIS_PORT: 6379

        depends_on:
            - postgres
            - redis

volumes:
    postgres_data:
    minio_data:
