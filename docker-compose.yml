services:
    postgres:
        image: postgres:16
        container_name: ai-doc-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: ai_docs
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:7
        container_name: ai-doc-redis
        restart: unless-stopped
        ports:
            - "6379:6379"

    api:
        build:
            context: .
            dockerfile: apps/api/Dockerfile

        ports:
            - "3001:3001"

        environment:
            PORT: 3001

            DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_docs

            REDIS_HOST: redis
            REDIS_PORT: 6379

        depends_on:
            - postgres
            - redis

        volumes:
            - ./uploads:/app/uploads

    worker:
        build:
            context: .
            dockerfile: apps/worker/Dockerfile

        environment:
            # protocol://username:password@host:port/database
            DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_docs

            REDIS_HOST: redis
            REDIS_PORT: 6379

        depends_on:
            - postgres
            - redis

        volumes:
            - ./uploads:/app/uploads

volumes:
    postgres_data:
